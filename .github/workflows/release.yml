name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "No tag found" && exit 1
          fi
          VERSION="${TAG#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_number=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Import signing certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/developer_id.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          echo -n "$DEVELOPER_ID_CERT_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import Apple intermediate certs
          curl -sL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" -o "$RUNNER_TEMP/DeveloperIDG2CA.cer"
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign

          security import "$CERT_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" -k "$KEYCHAIN_PATH" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Verify
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Voom/Voom.xcodeproj -scheme Voom

      - name: Build Release
        run: |
          xcodebuild -project Voom/Voom.xcodeproj -scheme Voom \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            ENABLE_HARDENED_RUNTIME=YES \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime --keychain $RUNNER_TEMP/app-signing.keychain-db" \
            build

      - name: Re-sign embedded frameworks
        run: |
          APP_PATH="build/Build/Products/Release/Voom.app"
          IDENTITY="Developer ID Application"
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"

          # Re-sign all Sparkle binaries with timestamp and hardened runtime
          find "$APP_PATH/Contents/Frameworks" -type f -perm +111 -not -name "*.plist" -not -name "*.py" | while read binary; do
            echo "Signing: $binary"
            codesign --force --sign "$IDENTITY" --timestamp --options runtime \
              --keychain "$KEYCHAIN" "$binary"
          done

          # Re-sign XPC services
          find "$APP_PATH/Contents/Frameworks" -name "*.xpc" -type d | while read xpc; do
            echo "Signing XPC: $xpc"
            codesign --force --sign "$IDENTITY" --timestamp --options runtime \
              --keychain "$KEYCHAIN" --deep "$xpc"
          done

          # Re-sign Sparkle Updater.app
          find "$APP_PATH/Contents/Frameworks" -name "*.app" -type d | while read app; do
            echo "Signing embedded app: $app"
            codesign --force --sign "$IDENTITY" --timestamp --options runtime \
              --keychain "$KEYCHAIN" --deep "$app"
          done

          # Re-sign the framework itself
          find "$APP_PATH/Contents/Frameworks" -name "*.framework" -type d | while read fw; do
            echo "Signing framework: $fw"
            codesign --force --sign "$IDENTITY" --timestamp --options runtime \
              --keychain "$KEYCHAIN" "$fw"
          done

          # Re-sign the main app with entitlements
          codesign --force --sign "$IDENTITY" --timestamp --options runtime \
            --entitlements "Voom/Voom/Resources/Voom.entitlements" \
            --keychain "$KEYCHAIN" "$APP_PATH"

          # Verify
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="build/Build/Products/Release/Voom.app"

          # Create a zip for notarization
          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/Voom-notarize.zip"

          # Submit for notarization
          SUBMIT_OUT=$(xcrun notarytool submit "$RUNNER_TEMP/Voom-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 600 2>&1) || true
          echo "$SUBMIT_OUT"

          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | grep "id:" | head -1 | awk '{print $2}')

          if echo "$SUBMIT_OUT" | grep -q "status: Invalid"; then
            echo "Notarization failed. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            exit 1
          fi

          # Staple the ticket to the app
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir -p dist
          create-dmg \
            --volname "Voom" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Voom.app" 150 190 \
            --hide-extension "Voom.app" \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "dist/Voom.dmg" \
            "build/Build/Products/Release/Voom.app"

          # Sign the DMG itself
          codesign --force --sign "Developer ID Application" \
            --keychain "$RUNNER_TEMP/app-signing.keychain-db" \
            "dist/Voom.dmg"

          # Notarize the DMG
          xcrun notarytool submit "dist/Voom.dmg" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_ID_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait --timeout 600

          xcrun stapler staple "dist/Voom.dmg"

      - name: Sign DMG and generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_UPDATE=$(find build/SourcePackages/artifacts -name "sign_update" -not -path "*/old_dsa*" | head -1)
          if [ -z "$SIGN_UPDATE" ]; then
            echo "sign_update not found, trying checkout path"
            SIGN_UPDATE=$(find build/SourcePackages/checkouts/Sparkle -maxdepth 1 -name "sign_update" | head -1)
          fi
          echo "Using sign_update at: $SIGN_UPDATE"

          # Write private key to temp file
          echo -n "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key

          # Sign the DMG
          SIGN_OUTPUT=$("$SIGN_UPDATE" --ed-key-file /tmp/sparkle_key dist/Voom.dmg)
          rm /tmp/sparkle_key
          echo "Sign output: $SIGN_OUTPUT"

          # Extract signature and length
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
          LENGTH=$(echo "$SIGN_OUTPUT" | grep -o 'length="[^"]*"' | cut -d'"' -f2)

          VERSION="${{ steps.tag.outputs.version_number }}"
          TAG="${{ steps.tag.outputs.version }}"
          PUB_DATE=$(date -u '+%a, %d %b %Y %H:%M:%S +0000')

          cat > dist/appcast.xml << APPCAST_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
              <channel>
                  <title>Voom Updates</title>
                  <link>https://github.com/aritropaul/voom/releases</link>
                  <description>Most recent updates to Voom</description>
                  <language>en</language>
                  <item>
                      <title>Voom ${VERSION}</title>
                      <pubDate>${PUB_DATE}</pubDate>
                      <sparkle:version>${VERSION}</sparkle:version>
                      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                      <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>
                      <enclosure url="https://github.com/aritropaul/voom/releases/download/${TAG}/Voom.dmg"
                                 sparkle:edSignature="${ED_SIGNATURE}"
                                 length="${LENGTH}"
                                 type="application/octet-stream" />
                  </item>
              </channel>
          </rss>
          APPCAST_EOF

          echo "Appcast generated with signature for $VERSION"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          files: |
            dist/Voom.dmg
            dist/appcast.xml
          generate_release_notes: true
